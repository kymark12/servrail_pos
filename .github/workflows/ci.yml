name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Prisma resolves datasource env() lazily, but generate/typecheck read the schema —
# give them harmless placeholders. The integration job overrides these to point at
# its throwaway local Postgres (see test/global-db.ts + vitest.config.mts).
env:
  DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
  DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

jobs:
  checks:
    name: Lint · Types · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test:unit

  integration:
    name: Integration (Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      # Spins up a disposable postgres:16-alpine container (Docker is preinstalled
      # on ubuntu runners), applies the schema, and tears it down after.
      - name: Integration tests
        run: npm run test:integration
